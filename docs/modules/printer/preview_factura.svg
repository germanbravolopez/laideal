<text x="12" y="962" font-size="14" text-anchor="start" xml:space="preserve">- No se responde de botones, adornos, ni accesorios salvo</text>
<text x="12" y="981" font-size="14" text-anchor="start" xml:space="preserve">anotación en este recibo. Se recomienda retirarlos antes de</text>
<text x="12" y="1000" font-size="14" text-anchor="start" xml:space="preserve">entregar.</text>
<text x="12" y="1019" font-size="14" text-anchor="start" xml:space="preserve">- Si el estado de la prenda implica riesgo de daño o resultado</text>
