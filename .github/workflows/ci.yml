name: CI

on:
  push:
    branches: [ develop, master ]
  pull_request:
    branches: [ develop, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Install Qt + MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure --no-tests=error --output-junit ctest-junit.xml
          $code = $LASTEXITCODE
          $xml = "build/ctest-junit.xml"
          if (Test-Path $xml) {
            [xml]$r = Get-Content $xml
            $s = $r.testsuite
            $emoji = if ([int]$s.failures -eq 0) { ':white_check_mark:' } else { ':x:' }
            $md = @()
            $md += "## $emoji Test results"
            $md += ""
            $md += "**$($s.tests) tests, $($s.failures) failed, $($s.skipped) skipped** in $($s.time)s"
            $md += ""
            $md += "| Result | Test | Time (s) |"
            $md += "| :----: | ---- | -------: |"
            foreach ($c in $s.testcase) {
              $status = if ($c.status -eq 'fail') { ':x: fail' } else { ':white_check_mark: pass' }
              $md += "| $status | $($c.name) | $($c.time) |"
            }
            ($md -join "`n") | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }
          exit $code

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: laideal
          path: build/src/app/laideal.exe
