name: CI

on:
  push:
    branches: [ develop, master, 'feature/**' ]
  pull_request:
    branches: [ develop, master, 'feature/**' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Install Qt + MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure --no-tests=error
          $code = $LASTEXITCODE
          & .github/scripts/Render-TestSummary.ps1 -Title "Test results"
          exit $code

      # The ticket_preview test renders a sample recibo + factura to PNG; keep
      # them downloadable even if the run-summary sanitizes the inline data: URIs.
      - name: Upload ticket previews
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ticket-previews
          path: build/tests/preview_*.png
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: laideal
          path: build/src/app/laideal.exe
