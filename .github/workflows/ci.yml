name: CI

on:
  push:
    branches: [ develop, master ]
  pull_request:
    branches: [ develop, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Install Qt + MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure --no-tests=error
          $code = $LASTEXITCODE
          # Render a foldable per-suite summary from the Qt JUnit files (one
          # <testcase> per test method). Emojis via [char] so the YAML stays ASCII.
          $files = Get-ChildItem build -Filter 'test-results-*.xml' -ErrorAction SilentlyContinue | Sort-Object Name
          $lifecycle = @('initTestCase','cleanupTestCase','initTestCase_data')
          $grandTotal = 0; $grandFail = 0
          $blocks = @()
          foreach ($f in $files) {
            [xml]$r = Get-Content $f.FullName
            $su = $r.testsuite
            $methods = @($su.testcase | Where-Object { $lifecycle -notcontains $_.name })
            $t = $methods.Count
            $fl = @($methods | Where-Object { $_.failure -or $_.error }).Count
            $grandTotal += $t; $grandFail += $fl
            $icon = if ($fl -eq 0) { [char]0x2705 } else { [char]0x274C }
            $blocks += "<details><summary>$icon <b>$($su.name)</b> - $t tests, $fl failed ($($su.time)s)</summary>"
            $blocks += ""
            $blocks += "| Result | Test | Time (s) |"
            $blocks += "| :----: | ---- | -------: |"
            foreach ($m in $methods) {
              $mi = if ($m.failure -or $m.error) { [char]0x274C } else { [char]0x2705 }
              $blocks += "| $mi | $($m.name) | $($m.time) |"
            }
            $blocks += ""; $blocks += "</details>"; $blocks += ""
          }
          $top = if ($grandFail -eq 0) { [char]0x2705 } else { [char]0x274C }
          $md = @("## $top Test results", "", "**$grandTotal tests, $grandFail failed** across $($files.Count) suite(s)", "") + $blocks
          ($md -join "`n") | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          exit $code

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: laideal
          path: build/src/app/laideal.exe
