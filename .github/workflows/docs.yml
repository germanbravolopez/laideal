name: Docs

# Builds the MkDocs Material site and publishes it to GitHub Pages using the
# official Pages flow (upload-pages-artifact + deploy-pages).
#
# Prerequisite (one-time, in the repo): Settings -> Pages -> Build and
# deployment -> Source = "GitHub Actions".

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, without cancelling an in-progress run
# (the official Pages recommendation — let production deploys finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build runs on every push and PR. On a PR this is the publication test: it
  # proves the site renders cleanly before anything reaches master/Pages.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install docs dependencies
        run: pip install ".[docs]"

      - name: Build site
        # Non-strict: cross-repo links to src/ and root files are expected
        # warnings (see mkdocs.yml validation settings) and must not fail.
        run: mkdocs build --site-dir _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Deploy + verify only on a real push to master (never on PRs from forks).
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify publication
        # Confirms the site is actually live by polling the published URL until
        # it answers 200 (Pages CDN propagation can lag the deploy by seconds).
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          echo "Checking $url"
          for i in $(seq 1 12); do
            code=$(curl -fsSL -o /dev/null -w '%{http_code}' "$url" || true)
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Pages published successfully at $url"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Site did not return HTTP 200 at $url"
          exit 1
